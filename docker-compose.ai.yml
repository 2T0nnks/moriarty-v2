# ============================================================
#  AI override — adds Ollama (CPU) and enables the AI panel.
#
#  Use with:
#    docker-compose -f docker-compose.yml -f docker-compose.ai.yml up --build
#
#  For GPU acceleration, also add one of:
#    -f docker-compose.nvidia.yml
#    -f docker-compose.amd.yml
#    -f docker-compose.vulkan.yml
# ============================================================

services:
  # ── Ollama — CPU inference ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: moriarty-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - moriarty-network

  # ── Model pull — runs once on first start, then exits ────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: moriarty-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "qwen2.5:1.5b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - moriarty-network
    restart: "no"

  # ── Backend override — enable AI and connect to Ollama ───────────────────────
  backend:
    environment:
      - ENABLE_AI=true
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
    name: moriarty-ollama-data

networks:
  moriarty-network:
    name: moriarty-network

